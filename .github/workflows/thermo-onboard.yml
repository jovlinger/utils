# Build and push thermo/onboard to GHCR (ghcr.io/jovlinger/thermo-onboard)
# Trigger: push to thermo/onboard/ or workflow_dispatch
# Pi Zero 2 W: arm64 or armhf (32-bit). If push fails with 403: link package to this repo:
#   github.com/users/jovlinger/packages/container/thermo-onboard → Package settings →
#   Manage Actions access → Add repository (jovlinger/utils) with Write role.
name: Thermo Onboard

on:
  push:
    branches: [main, master]
    paths:
      - "thermo/onboard/**"
      - ".github/workflows/thermo-onboard.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare docker build context (scratch)
        run: |
          rm -rf ./.docker-build/thermo-onboard
          mkdir -p ./.docker-build/thermo-onboard
          cp -a ./thermo/onboard/. ./.docker-build/thermo-onboard/
          mkdir -p ./.docker-build/thermo-onboard/bin
          curl -fsSL "https://raw.githubusercontent.com/jovlinger/bin/master/run-with-stdout-logged.py" \
            -o ./.docker-build/thermo-onboard/bin/run-with-stdout-logged.py

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./.docker-build/thermo-onboard
          platforms: linux/arm64,linux/arm/v7
          push: true
          provenance: false
          tags: |
            ghcr.io/jovlinger/thermo-onboard:latest
            ghcr.io/jovlinger/thermo-onboard:${{ github.sha }}
