# Build and push thermo/onboard to GHCR (ghcr.io/jovlinger/thermo-onboard)
# Pi Zero 2 W: linux/arm64
name: Thermo Onboard

on:
  push:
    branches: [main, master]
    paths:
      - "thermo/onboard/**"
      - ".github/workflows/thermo-onboard.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: ./thermo/onboard
          platforms: linux/arm64
          push: true
          tags: |
            ghcr.io/jovlinger/thermo-onboard:latest
            ghcr.io/jovlinger/thermo-onboard:${{ github.sha }}
