# Build and push thermo-onboard-app + thermo-onboard-twoway to GHCR.
# Trigger: push to thermo/onboard/ or workflow_dispatch
# Pi Zero 2 W: arm64 or armhf.
#
# If push fails (e.g. buildx: "unexpected status from HEAD request … ghcr.io … 403 Forbidden"):
# the image layers built OK; GHCR rejected the manifest/blob write. Link each package
# to this repo so GITHUB_TOKEN can push:
#   User/org → Packages → thermo-onboard-app (and thermo-onboard-twoway) → Package settings →
#   Manage Actions access → Add repository (jovlinger/utils) with Write role.
# Same fix for plain "403" on push without HEAD in the message.
#
# User-owned repo: no org-wide policy step. Under a GitHub Organization, also allow
# Actions to publish/update container packages (org Settings → Actions → General).
name: Thermo Onboard

on:
  push:
    branches: [main, master]
    paths:
      - "thermo/onboard/**"
      - "extdeps/**"
      - ".github/workflows/thermo-onboard.yml"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare docker build context (scratch)
        run: |
          rm -rf ./.docker-build/thermo-onboard
          mkdir -p ./.docker-build/thermo-onboard
          cp -a ./thermo/onboard/. ./.docker-build/thermo-onboard/
          mkdir -p ./.docker-build/thermo-onboard/.docker-import
          cp ./extdeps/run-with-stdout-logged.py \
            ./.docker-build/thermo-onboard/.docker-import/run-with-stdout-logged.py
          mkdir -p ./.docker-build/thermo-onboard/.docker-import/ui
          cp -a ./thermo/ui/. ./.docker-build/thermo-onboard/.docker-import/ui/

      - name: Build and push onboard app
        uses: docker/build-push-action@v6
        with:
          context: ./.docker-build/thermo-onboard
          file: ./.docker-build/thermo-onboard/hardware/pizero2w/Dockerfile.onboard
          platforms: linux/arm64,linux/arm/v7
          push: true
          provenance: false
          tags: |
            ghcr.io/jovlinger/thermo-onboard-app:latest
            ghcr.io/jovlinger/thermo-onboard-app:${{ github.sha }}

      - name: Build and push twoway
        uses: docker/build-push-action@v6
        with:
          context: ./.docker-build/thermo-onboard
          file: ./.docker-build/thermo-onboard/hardware/pizero2w/Dockerfile.twoway
          platforms: linux/arm64,linux/arm/v7
          push: true
          provenance: false
          tags: |
            ghcr.io/jovlinger/thermo-onboard-twoway:latest
            ghcr.io/jovlinger/thermo-onboard-twoway:${{ github.sha }}
