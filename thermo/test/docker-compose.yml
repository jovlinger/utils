services:
  dmz:
    image: jovlinger/thermo/dmz
    build:
      context: ../dmz
    environment:
      ENV: DOCKERTEST
      PORT: "8080"
      ZONE_PUBLIC_KEY_PATH: /keys/pub.pem
    volumes:
      - ./keys:/keys:ro
    tmpfs:
      - /tmp
      - /var/log

  onboard:
    # Same names as production (thermo/onboard/Makefile, install/docker-compose.yml). Build with: cd ../onboard && make images
    image: ghcr.io/jovlinger/thermo-onboard-app:latest
    build:
      context: ../onboard
      dockerfile: Dockerfile.onboard
    environment:
      ENV: DOCKERTEST
      PORT: "5000"
    volumes:
      - ./keys:/keys:ro
    depends_on:
      - dmz
    tmpfs:
      - /tmp
      - /var/log

  twoway:
    image: ghcr.io/jovlinger/thermo-onboard-twoway:latest
    build:
      context: ../onboard
      dockerfile: Dockerfile.twoway
    environment:
      ENV: DOCKERTEST
      ONBOARD_URL: http://onboard:5000
      DMZ_URL: http://dmz:8080
      ZONE_PRIVATE_KEY_PATH: /keys/priv.pem
      ZONE_NAME: zoneymczoneface
    volumes:
      - ./keys:/keys:ro
    depends_on:
      - dmz
      - onboard
    tmpfs:
      - /tmp
      - /var/log

  testdriver:
    image: jovlinger/thermo/test
    build:
      context: .
    environment:
      DMZ_URL: http://dmz:8080
      ONBOARD_URL: http://onboard:5000
      E2E_ZONE_NAME: zoneymczoneface
    depends_on:
      - dmz
      - onboard
      - twoway
