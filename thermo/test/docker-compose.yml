version: "3.9"
services:
  dmz:
    image: jovlinger/thermo/dmz
    environment:
      ENV: DOCKERTEST
      PORT: "5000"
      ZONE_PUBLIC_KEY_PATH: /keys/pub.pem
    volumes:
      - ./keys:/keys:ro

  onboard:
    image: jovlinger/thermo/onboard
    environment:
      ENV: DOCKERTEST
      PORT: "5000"
      ZONE_PRIVATE_KEY_PATH: /keys/priv.pem
      ZONE_NAME: zoneymczoneface
    volumes:
      - ./keys:/keys:ro
    depends_on:
      - dmz

  testdriver:
    image: jovlinger/thermo/test
    environment:
      DMZ_URL: http://dmz:5000
      ONBOARD_URL: http://onboard:5000
      E2E_ZONE_NAME: zoneymczoneface
    depends_on:
      - dmz
      - onboard
