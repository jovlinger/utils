# DMZ tweakable settings - edit here, then rebuild with ./build-and-write.sh
# (Secrets stay in thermo/priv/; see SECRETS.md.)

# Production eth0 (must match MikroTik DMZ NAT target on ether10).
# CORRECTED 2026-05-18: was 10.1.1.2/24 (agent copied a prompt example); tik uses 10.0.0.0/24.
NETWORK_ADDR=10.0.0.2/24
NETWORK_GATEWAY=10.0.0.1

# Resolver IPs for host + chroot (comma-separated). Written to install/dns.conf at build.
DNS_SERVERS=1.1.1.1,8.8.8.8,8.8.4.4

# Start pubkey-only sshd on the DMZ network at boot (builder ~/.ssh -> rescue_authorized_keys).
# Rescue LAB path (`sh /root/sshd.sh`, 192.168.88.0/24) is unchanged.
SSHD_ON_BOOT=yes

# Flask API port and bundled HTML UI port (ui_server proxies to Flask on PORT).
PORT=5000
UI_PORT=8090

# Public URLs (optional; leave empty if unset). No trailing slash.
# THERMO_UI_PUBLIC_ORIGIN: where browsers open the HTML UI after OAuth.
# DMZ_PUBLIC_BASE_URL: public base for this DMZ (links, callbacks); legacy alias DMZ_PUBLIC_URL still works via env.
THERMO_UI_PUBLIC_ORIGIN=
DMZ_PUBLIC_BASE_URL=

# Browser login session after Google OAuth (seconds). Sets a persistent cookie (Max-Age).
# Use 0 only for a session cookie (evicted often on iOS even if the browser stays open).
# 30 days (30 * 24 * 60 * 60) = 2592000 seconds.
OAUTH_SESSION_LIFETIME_SECS=2592000

# Flask zone long-poll (seconds).
LONG_POLL_TIMEOUT_SECS=60
LONG_POLL_SLEEP_SECS=1.0

# DMZ app log level: TRACE, DEBUG, INFO, WARNING, ERROR (TRACE = per-request body sizes)
LOG_LEVEL=DEBUG

# Identical obsolete DEBUG lines to skip before logging again (<=1 = log every time).
OBSOLETE_LOG_SUPPRESS_REPEAT=10
